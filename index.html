<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MCM SERVICE CI</title>
<meta name="theme-color" content="#ff6600">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial; background:#1a1a1a; color:white; min-height:100vh; }
.header { background:linear-gradient(135deg,#ff6600,#cc4400); padding:15px; text-align:center; position:sticky; top:0; z-index:100; }
.header h1 { font-size:20px; }
.header p { font-size:11px; color:#ffe; margin-top:2px; }
.ecran { display:none; padding:15px; padding-bottom:80px; }
.ecran.actif { display:block; }
.btn { width:100%; padding:14px; border:none; border-radius:10px; font-size:14px; font-weight:bold; color:white; cursor:pointer; margin-bottom:10px; }
.btn-orange { background:linear-gradient(135deg,#ff6600,#cc4400); }
.btn-vert { background:linear-gradient(135deg,#27ae60,#1e8449); }
.btn-rouge { background:linear-gradient(135deg,#e74c3c,#c0392b); }
.btn-gris { background:#333; }
.card { background:#252525; border-radius:12px; padding:12px; margin-bottom:12px; border:1px solid #333; }
.card-titre { color:#ff6600; font-size:13px; font-weight:bold; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:6px; }
.input-group { margin-bottom:12px; }
.input-group label { font-size:11px; color:#aaa; margin-bottom:4px; display:block; }
.input-group input, .input-group select, .input-group textarea { width:100%; padding:12px; border-radius:8px; border:1px solid #444; background:#333; color:white; font-size:13px; }
.input-group textarea { height:80px; resize:none; }
.msg { padding:10px; border-radius:8px; margin-bottom:10px; font-size:12px; text-align:center; }
.msg.bon { background:#1e8449; }
.msg.mauvais { background:#c0392b; }
.demande-card { background:#2a2a2a; border-radius:10px; padding:10px; margin-bottom:8px; border-left:4px solid #2980b9; }
.tabs { display:flex; gap:5px; margin-bottom:12px; }
.tab { flex:1; padding:8px; border:1px solid #ff6600; border-radius:8px; background:transparent; color:#ff6600; font-size:11px; cursor:pointer; text-align:center; }
.tab.actif { background:#ff6600; color:white; }
.logo-zone { text-align:center; padding:20px 0 10px; }
.logo-zone .emoji { font-size:50px; }
.logo-zone h2 { color:#ff6600; font-size:22px; font-weight:bold; margin-top:5px; }
.logo-zone p { color:#aaa; font-size:12px; }
</style>
</head>
<body>
<div class="header">
  <h1>🔧 MCM SERVICE CI</h1>
  <p>Mécanique Camara Maïga • Abidjan, Côte d'Ivoire</p>
</div>
<div id="ecran-accueil" class="ecran actif">
  <div class="logo-zone">
    <div class="emoji">🚗🔧</div>
    <h2>MCM SERVICE CI</h2>
    <p>Dépannage rapide à Abidjan</p>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab" onclick="switchTab('connexion',this)">Connexion</div>
      <div class="tab actif" onclick="switchTab('inscription',this)">Inscription</div>
    </div>
    <div id="tab-connexion" style="display:none">
      <div class="input-group"><label>Email</label><input type="email" id="login-email" placeholder="ton@email.com"></div>
      <div class="input-group"><label>Mot de passe</label><input type="password" id="login-mdp" placeholder="••••••••"></div>
      <button class="btn btn-orange" onclick="seConnecter()">🔑 Se connecter</button>
      <div id="msg-login"></div>
    </div>
    <div id="tab-inscription">
      <div class="input-group"><label>Nom complet</label><input type="text" id="reg-nom" placeholder="Ton nom complet"></div>
      <div class="input-group"><label>Email</label><input type="email" id="reg-email" placeholder="ton@email.com"></div>
      <div class="input-group"><label>Mot de passe</label><input type="password" id="reg-mdp" placeholder="••••••••"></div>
      <div class="input-group"><label>Numéro WhatsApp</label><input type="tel" id="reg-tel" placeholder="07XXXXXXXX"></div>
      <div class="input-group"><label>Je suis</label>
        <select id="reg-role" onchange="toggleQuartier()">
          <option value="client">🚗 Un Client</option>
          <option value="mecanicien">🔧 Un Mécanicien</option>
        </select>
      </div>
      <div class="input-group" id="groupe-quartier" style="display:none">
        <label>Votre quartier</label>
        <select id="reg-quartier">
          <option value="">Choisir...</option>
          <option value="Yopougon">Yopougon</option>
          <option value="Cocody">Cocody</option>
          <option value="Abobo">Abobo</option>
          <option value="Adjamé">Adjamé</option>
          <option value="Plateau">Plateau</option>
          <option value="Marcory">Marcory</option>
          <option value="Koumassi">Koumassi</option>
          <option value="Port-Bouët">Port-Bouët</option>
          <option value="Treichville">Treichville</option>
          <option value="Attécoubé">Attécoubé</option>
        </select>
      </div>
      <button class="btn btn-vert" onclick="sInscrire()">✅ Créer mon compte</button>
      <div id="msg-register"></div>
    </div>
    <p style="text-align:center;font-size:10px;color:#555;margin-top:10px;">Paiement : 📱 Wave • 🟠 Orange Money • 💛 MTN Money</p>
  </div>
</div>
<div id="ecran-client" class="ecran">
  <div class="card">
    <div class="card-titre">🚗 Tableau de bord Client</div>
    <p id="client-bienvenue" style="color:#aaa;font-size:12px;margin-bottom:10px;"></p>
    <button class="btn btn-orange" onclick="afficherEcran('ecran-demande')">🆘 Demander un mécanicien</button>
    <button class="btn btn-rouge" onclick="seDeconnecter()">🚪 Déconnexion</button>
  </div>
</div>
<div id="ecran-mecanicien" class="ecran">
  <div class="card">
    <div class="card-titre">🔧 Tableau de bord Mécanicien</div>
    <p id="meca-bienvenue" style="color:#aaa;font-size:12px;margin-bottom:10px;"></p>
    <button class="btn btn-orange" onclick="chargerDemandes()">📋 Voir les demandes</button>
    <button class="btn btn-rouge" onclick="seDeconnecter()">🚪 Déconnexion</button>
  </div>
  <div id="liste-demandes"></div>
</div>
<div id="ecran-demande" class="ecran">
  <div class="card">
    <div class="card-titre">🆘 Nouvelle demande</div>
    <div class="input-group"><label>Votre quartier</label>
      <select id="dem-quartier">
        <option value="">Choisir...</option>
        <option value="Yopougon">Yopougon</option>
        <option value="Cocody">Cocody</option>
        <option value="Abobo">Abobo</option>
        <option value="Adjamé">Adjamé</option>
        <option value="Plateau">Plateau</option>
        <option value="Marcory">Marcory</option>
        <option value="Koumassi">Koumassi</option>
        <option value="Port-Bouët">Port-Bouët</option>
        <option value="Treichville">Treichville</option>
        <option value="Attécoubé">Attécoubé</option>
      </select>
    </div>
    <div class="input-group"><label>Description du problème</label><textarea id="dem-description" placeholder="Ex: Ma voiture ne démarre plus..."></textarea></div>
    <button class="btn btn-vert" onclick="envoyerDemande()">📤 Envoyer</button>
    <button class="btn btn-gris" onclick="afficherEcran('ecran-client')">⬅ Retour</button>
    <div id="msg-demande"></div>
  </div>
</div>
<script>
const SB_URL = 'https://ddpedkjmuslcrzqjjfoi.supabase.co';
const SB_KEY = 'sb_publishable_IiH75oXzI79hsqW3zMar8w_skKQtqIl';
const HEADERS = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
let userConnecte = null;

function afficherEcran(id){document.querySelectorAll('.ecran').forEach(e=>e.classList.remove('actif'));document.getElementById(id).classList.add('actif');window.scrollTo(0,0);}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('actif'));
  el.classList.add('actif');
  document.getElementById('tab-connexion').style.display=tab==='connexion'?'block':'none';
  document.getElementById('tab-inscription').style.display=tab==='inscription'?'block':'none';
}

function toggleQuartier(){document.getElementById('groupe-quartier').style.display=document.getElementById('reg-role').value==='mecanicien'?'block':'none';}

function afficherMsg(id,texte,type){document.getElementById(id).innerHTML='<div class="msg '+type+'">'+texte+'</div>';setTimeout(()=>document.getElementById(id).innerHTML='',4000);}

async function sInscrire(){
  const nom=document.getElementById('reg-nom').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const mdp=document.getElementById('reg-mdp').value;
  const tel=document.getElementById('reg-tel').value.trim();
  const role=document.getElementById('reg-role').value;
  const quartier=document.getElementById('reg-quartier').value;
  if(!nom||!email||!mdp||!tel){afficherMsg('msg-register','❌ Remplis tous les champs !','mauvais');return;}
  try{
    const res=await fetch(SB_URL+'/rest/v1/profiles',{method:'POST',headers:{...HEADERS,'Prefer':'return=minimal'},body:JSON.stringify({nom,email,telephone:tel,mot_de_passe:mdp,role,quartier,disponible:true})});
    if(res.ok||res.status===201){afficherMsg('msg-register','✅ Compte créé ! Connecte-toi.','bon');switchTab('connexion',document.querySelector('.tab'));}
    else{const d=await res.json();afficherMsg('msg-register','❌ Erreur: '+(d.message||d.details||'Réessaie'),'mauvais');}
  }catch(e){afficherMsg('msg-register','❌ Connexion impossible','mauvais');}
}

async function seConnecter(){
  const email=document.getElementById('login-email').value.trim();
  const mdp=document.getElementById('login-mdp').value;
  if(!email||!mdp){afficherMsg('msg-login','❌ Remplis tous les champs !','mauvais');return;}
  try{
    const res=await fetch(SB_URL+'/rest/v1/profiles?email=eq.'+encodeURIComponent(email)+'&select=*',{headers:HEADERS});
    const data=await res.json();
    if(data&&data.length>0){
      const user=data[0];
      if(user.mot_de_passe===mdp){
        userConnecte=user;
        localStorage.setItem('mcm_user',JSON.stringify(user));
        if(user.role==='mecanicien'){document.getElementById('meca-bienvenue').textContent='Bonjour '+user.nom+' 👋';afficherEcran('ecran-mecanicien');}
        else{document.getElementById('client-bienvenue').textContent='Bonjour '+user.nom+' 👋';afficherEcran('ecran-client');}
      }else{afficherMsg('msg-login','❌ Mot de passe incorrect !','mauvais');}
    }else{afficherMsg('msg-login','❌ Email introuvable !','mauvais');}
  }catch(e){afficherMsg('msg-login','❌ Connexion impossible','mauvais');}
}

async function envoyerDemande(){
  const quartier=document.getElementById('dem-quartier').value;
  const description=document.getElementById('dem-description').value.trim();
  if(!quartier||!description){afficherMsg('msg-demande','❌ Remplis tous les champs !','mauvais');return;}
  try{
    const res=await fetch(SB_URL+'/rest/v1/demandes',{method:'POST',headers:{...HEADERS,'Prefer':'return=minimal'},body:JSON.stringify({client_nom:userConnecte.nom,client_telephone:userConnecte.telephone,quartier,description,statut:'attente',mecanicien_id:''})});
    if(res.ok||res.status===201){afficherMsg('msg-demande','✅ Demande envoyée !','bon');document.getElementById('dem-quartier').value='';document.getElementById('dem-description').value='';}
    else{afficherMsg('msg-demande','❌ Erreur envoi','mauvais');}
  }catch(e){afficherMsg('msg-demande','❌ Connexion impossible','mauvais');}
}

async function chargerDemandes(){
  try{
    const res=await fetch(SB_URL+'/rest/v1/demandes?statut=eq.attente&order=created_at.desc',{headers:HEADERS});
    const data=await res.json();
    const liste=document.getElementById('liste-demandes');
    if(data&&data.length>0){
      liste.innerHTML=data.map(d=>'<div class="demande-card"><div style="font-weight:bold;color:#2980b9">'+d.client_nom+'</div><div style="color:#aaa;font-size:11px">📍 '+d.quartier+' • 📞 '+d.client_telephone+'</div><div style="color:white;font-size:12px;margin-top:5px">'+d.description+'</div><button class="btn btn-vert" style="margin-top:8px;padding:8px" onclick="accepterDemande(\''+d.id+'\',\''+d.client_nom+'\',\''+d.client_telephone+'\')">✅ Accepter</button></div>').join('');
    }else{liste.innerHTML='<div class="card"><p style="color:#aaa;text-align:center">Aucune demande en attente</p></div>';}
  }catch(e){console.error(e);}
}

async function accepterDemande(id,nom,tel){
  try{
    await fetch(SB_URL+'/rest/v1/demandes?id=eq.'+id,{method:'PATCH',headers:{...HEADERS,'Prefer':'return=minimal'},body:JSON.stringify({statut:'accepte',mecanicien_id:userConnecte.id})});
    alert('✅ Demande acceptée ! Contactez '+nom+' au '+tel);
    chargerDemandes();
  }catch(e){alert('Erreur');}
}

function seDeconnecter(){userConnecte=null;localStorage.removeItem('mcm_user');afficherEcran('ecran-accueil');}

const saved=localStorage.getItem('mcm_user');
if(saved){userConnecte=JSON.parse(saved);if(userConnecte.role==='mecanicien'){document.getElementById('meca-bienvenue').textContent='Bonjour '+userConnecte.nom+' 👋';afficherEcran('ecran-mecanicien');}else{document.getElementById('client-bienvenue').textContent='Bonjour '+userConnecte.nom+' 👋';afficherEcran('ecran-client');}}
</script>
</body>
</html>
